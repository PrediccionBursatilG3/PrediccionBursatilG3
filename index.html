<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0c0f18; --surface:#141a28;
    --border:rgba(255,255,255,.08);
    --text:#eef1f8; --text-dim:#a8b1c7; --text-mute:#6c7690;
    --violet:#7c5cff; --teal:#1fe0c4; --gold:#f59e0b;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:
      radial-gradient(900px 480px at 85% -10%, rgba(124,92,255,0.14), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', system-ui, -apple-system, sans-serif;
    gap:22px;
  }
  .glyph{
    width:58px; height:58px; border-radius:16px;
    background:linear-gradient(135deg, var(--teal), var(--violet));
    display:flex; align-items:center; justify-content:center;
    font-family:'Sora', system-ui, sans-serif; font-weight:800; font-size:24px; color:#0b0d14;
    box-shadow:0 10px 32px rgba(124,92,255,.35);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.06); } }
  h1{
    font-family:'Sora', system-ui, sans-serif; font-weight:700; font-size:1.4rem;
    margin:0; letter-spacing:-.2px;
  }
  h1 b{ font-weight:800; }
  p{
    margin:0; font-size:.85rem; color:var(--text-mute);
    letter-spacing:.02em; text-align:center; max-width:26em;
  }
  .loading-row{
    display:flex; align-items:center; gap:8px;
    font-family:'Inter', sans-serif; font-size:.78rem; color:var(--text-dim);
  }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--violet); animation:blink 1.2s infinite; }
  .dot:nth-child(2){ animation-delay:.2s; }
  .dot:nth-child(3){ animation-delay:.4s; }
  @keyframes blink{ 0%,100%{ opacity:.25; } 50%{ opacity:1; } }
  a.fallback{ color:var(--violet); font-weight:600; text-decoration:none; }
  a.fallback:hover{ text-decoration:underline; }
</style>
</head>
<body>

  <div class="glyph">AI</div>
  <h1><b>Invest</b>AI</h1>
  <p>Sistema Web de Apoyo en Decisiones de Inversión con Inteligencia Artificial<br>iDeSo · UNMSM · FISI · Grupo 10 · 2026-II</p>
  <div class="loading-row">
    Cargando acceso al sistema
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <noscript>
    <p>Activa JavaScript o continúa manualmente:
      <a class="fallback" href="HTML/1.-Autenticacion/01_autenticacion_v2.html">Ir al inicio de sesión →</a>
    </p>
  </noscript>
